<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZiroCode - 统一的 AI 模型接口网关</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #fafafa;
      color: #0a0a0a;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(249, 115, 70, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .hero-content {
      max-width: 900px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-title {
      font-size: 72px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
    }

    .hero-subtitle {
      font-size: 20px;
      color: #666;
      line-height: 1.6;
      margin-bottom: 48px;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
    }

    .api-box {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid #e5e5e5;
      border-radius: 16px;
      padding: 16px 24px;
      margin: 48px auto;
      max-width: 600px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      transition: all 0.2s;
    }

    .api-box:hover {
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
    }

    .api-text {
      flex: 1;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 15px;
      color: #0a0a0a;
      user-select: all;
    }

    .copy-btn {
      background: #f5f5f5;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      color: #666;
      cursor: pointer;
      transition: all 0.2s;
    }

    .copy-btn:hover {
      background: #e5e5e5;
      color: #0a0a0a;
    }

    .cta-buttons {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin-bottom: 80px;
    }

    .btn {
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
      display: inline-block;
    }

    .btn-primary {
      background: #F97346;
      color: white;
      border: none;
    }

    .btn-primary:hover {
      background: #e8673a;
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #0a0a0a;
      border: 1px solid #e5e5e5;
    }

    .btn-secondary:hover {
      background: #e5e5e5;
    }

    .platforms {
      margin-top: 80px;
    }

    .platforms-title {
      font-size: 14px;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 32px;
    }

    .platforms-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 32px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .platform-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 40px;
      opacity: 0.4;
      transition: opacity 0.2s;
      font-size: 16px;
      font-weight: 500;
      color: #0a0a0a;
    }

    .platform-logo:hover {
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .hero-title {
        font-size: 48px;
      }

      .hero-subtitle {
        font-size: 18px;
      }

      .api-box {
        flex-direction: column;
        align-items: stretch;
      }

      .api-text {
        font-size: 13px;
      }

      .cta-buttons {
        flex-direction: column;
      }

      .platforms-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="hero-content">
      <h1 class="hero-title">统一的<br>AI 模型接口网关</h1>
      <p class="hero-subtitle">
        兼容 OpenAI API 格式，统一接入 Claude、OpenAI、Gemini、OpenClaw 等主流模型。更稳定、更低成本。
      </p>

      <div class="api-box">
        <span class="api-text">https://api.zirocode.com/v1/chat/completions</span>
        <button class="copy-btn" onclick="copyAPI()">复制</button>
      </div>

      <div class="cta-buttons">
        <a href="/auth/register" class="btn btn-primary">获取 API Key</a>
        <a href="/docs" class="btn btn-secondary">查看文档</a>
      </div>

      <div class="platforms">
        <div class="platforms-title">支持的平台</div>
        <div class="platforms-grid">
          <div class="platform-logo">OpenAI</div>
          <div class="platform-logo">Claude</div>
          <div class="platform-logo">Gemini</div>
          <div class="platform-logo">OpenRouter</div>
          <div class="platform-logo">DeepSeek</div>
          <div class="platform-logo">OpenClaw</div>
          <div class="platform-logo">Qwen</div>
          <div class="platform-logo">Grok</div>
          <div class="platform-logo">Moonshot</div>
          <div class="platform-logo">Mistral</div>
          <div class="platform-logo">Llama</div>
          <div class="platform-logo">Stability AI</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function copyAPI() {
      const text = 'https://api.zirocode.com/v1/chat/completions';
      navigator.clipboard.writeText(text).then(() => {
        const btn = event.target;
        btn.textContent = '已复制';
        setTimeout(() => {
          btn.textContent = '复制';
        }, 2000);
      });
    }
  </script>
</body>
</html>
