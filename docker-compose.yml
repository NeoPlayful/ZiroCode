services:
  postgres:
    image: postgres:16-alpine
    container_name: zirocode-postgres
    environment:
      POSTGRES_USER: zirocode
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: zirocode
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zirocode"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zirocode-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    container_name: zirocode-server
    ports:
      - "4000:4000"
    env_file: ./server/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: zirocode-frontend
    ports:
      - "5173:5173"
    depends_on:
      - server

  nginx:
    image: nginx:alpine
    container_name: zirocode-nginx
    ports:
      - "3000:3000"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - server
      - frontend

volumes:
  postgres_data:
  redis_data:
